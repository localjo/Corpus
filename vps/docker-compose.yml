services:
  syncthing:
    image: syncthing/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    network_mode: host
    environment:
      # Syncthing runs as this uid/gid inside the container — host /srv/vaults must be writable (see docs/setup-and-operations.md).
      - PUID=1000
      - PGID=1000
    volumes:
      - ./syncthing/config:/var/syncthing/config
      # Same path in container as on host → Syncthing UI uses /srv/vaults/<name>
      - /srv/vaults:/srv/vaults
